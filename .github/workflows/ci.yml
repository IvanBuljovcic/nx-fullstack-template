name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup database
        run: |
          cd api
          cp .env.example .env
          sed -i 's|postgresql://.*|postgresql://test_user:test_password@localhost:5432/test_db?schema=public|' .env
          pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public

      - name: Lint
        run: pnpm check

      - name: Build
        run: pnpm nx run-many -t build --all

      - name: Test
        run: pnpm nx run-many -t test --all --coverage

      - name: E2E Tests
        run: pnpm nx run-many -t e2e --all
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db?schema=public
