<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E86DE"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#F0F4FA" rx="12"/>

  <!-- ─── TITLE ─────────────────────────────────────── -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E4D8C">LanguageLearningApp — Backend Architecture</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#888">Module ownership, entity relationships &amp; request flow</text>
  <line x1="60" y1="74" x2="1040" y2="74" stroke="#CBD5E8" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════════════ -->
  <!--  LEFT COLUMN: MODULE STRUCTURE                   -->
  <!-- ════════════════════════════════════════════════ -->

  <!-- Section label -->
  <text x="200" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E4D8C" letter-spacing="1">NESTJS MODULES</text>

  <!-- AppModule (root) -->
  <rect x="120" y="112" width="160" height="44" rx="8" fill="#1E4D8C" filter="url(#shadow)"/>
  <text x="200" y="130" text-anchor="middle" font-size="12" fill="white" font-weight="bold">AppModule</text>
  <text x="200" y="147" text-anchor="middle" font-size="10" fill="#AAC4F0">Root — imports everything</text>

  <!-- Arrows from AppModule down -->
  <line x1="200" y1="156" x2="200" y2="174" stroke="#1E4D8C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Module row -->
  <!-- AuthModule -->
  <rect x="30" y="178" width="118" height="44" rx="8" fill="#2E86DE" filter="url(#shadow)"/>
  <text x="89" y="196" text-anchor="middle" font-size="11" fill="white" font-weight="bold">AuthModule</text>
  <text x="89" y="212" text-anchor="middle" font-size="9.5" fill="#C8E0FA">register / login / JWT</text>

  <!-- UsersModule -->
  <rect x="162" y="178" width="118" height="44" rx="8" fill="#2E86DE" filter="url(#shadow)"/>
  <text x="221" y="196" text-anchor="middle" font-size="11" fill="white" font-weight="bold">UsersModule</text>
  <text x="221" y="212" text-anchor="middle" font-size="9.5" fill="#C8E0FA">user entity &amp; service</text>

  <!-- DecksModule -->
  <rect x="30" y="244" width="118" height="44" rx="8" fill="#27AE60" filter="url(#shadow)"/>
  <text x="89" y="262" text-anchor="middle" font-size="11" fill="white" font-weight="bold">DecksModule</text>
  <text x="89" y="278" text-anchor="middle" font-size="9.5" fill="#C8F0D8">CRUD for decks</text>

  <!-- CardsModule -->
  <rect x="162" y="244" width="118" height="44" rx="8" fill="#27AE60" filter="url(#shadow)"/>
  <text x="221" y="262" text-anchor="middle" font-size="11" fill="white" font-weight="bold">CardsModule</text>
  <text x="221" y="278" text-anchor="middle" font-size="9.5" fill="#C8F0D8">CRUD for cards</text>

  <!-- ProgressModule -->
  <rect x="30" y="310" width="118" height="44" rx="8" fill="#E67E22" filter="url(#shadow)"/>
  <text x="89" y="328" text-anchor="middle" font-size="11" fill="white" font-weight="bold">ProgressModule</text>
  <text x="89" y="344" text-anchor="middle" font-size="9.5" fill="#FDE8C8">SM-2 &amp; study endpoints</text>

  <!-- SchedulerModule -->
  <rect x="162" y="310" width="118" height="44" rx="8" fill="#E67E22" filter="url(#shadow)"/>
  <text x="221" y="328" text-anchor="middle" font-size="11" fill="white" font-weight="bold">SchedulerModule</text>
  <text x="221" y="344" text-anchor="middle" font-size="9.5" fill="#FDE8C8">cron / reminders</text>

  <!-- Module → Internal structure -->
  <!-- Example: inside DecksModule show controller + service -->
  <rect x="30" y="380" width="250" height="70" rx="6" fill="white" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4 3" filter="url(#shadow)"/>
  <text x="40" y="397" font-size="10" fill="#555" font-style="italic">Inside every module (example: Decks):</text>
  <text x="50" y="415" font-size="11" fill="#27AE60" font-weight="bold">Controller</text>
  <text x="50" y="430" font-size="10" fill="#666">Routes: GET/POST/PATCH/DELETE</text>
  <text x="160" y="415" font-size="11" fill="#27AE60" font-weight="bold">Service</text>
  <text x="160" y="430" font-size="10" fill="#666">Logic + DB queries</text>
  <text x="50" y="445" font-size="10" fill="#666" font-style="italic">dto/ — validates request bodies</text>

  <!-- ─── LEGEND ─────────────────────────── -->
  <rect x="30" y="468" width="250" height="90" rx="6" fill="white" stroke="#CBD5E8" stroke-width="1"/>
  <text x="155" y="485" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <rect x="44" y="494" width="14" height="12" rx="2" fill="#2E86DE"/>
  <text x="64" y="504" font-size="10" fill="#333">Auth + User modules</text>
  <rect x="44" y="512" width="14" height="12" rx="2" fill="#27AE60"/>
  <text x="64" y="522" font-size="10" fill="#333">Data modules (Decks, Cards)</text>
  <rect x="44" y="530" width="14" height="12" rx="2" fill="#E67E22"/>
  <text x="64" y="540" font-size="10" fill="#333">Logic modules (Progress, Scheduler)</text>
  <line x1="44" y1="548" x2="58" y2="548" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="64" y="552" font-size="10" fill="#333">FK relationship (owns / belongs to)</text>

  <!-- ════════════════════════════════════════════════ -->
  <!--  MIDDLE COLUMN: ENTITY RELATIONSHIPS            -->
  <!-- ════════════════════════════════════════════════ -->
  <line x1="310" y1="82" x2="310" y2="760" stroke="#CBD5E8" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="620" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E4D8C" letter-spacing="1">DATABASE ENTITIES &amp; RELATIONSHIPS</text>

  <!-- ── USER ── -->
  <rect x="490" y="112" width="260" height="180" rx="10" fill="white" stroke="#1E4D8C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="490" y="112" width="260" height="34" rx="10" fill="#1E4D8C"/>
  <rect x="490" y="130" width="260" height="16" fill="#1E4D8C"/>
  <text x="620" y="134" text-anchor="middle" font-size="13" fill="white" font-weight="bold">👤 User</text>

  <text x="504" y="162" font-size="11" fill="#555" font-weight="bold">id</text><text x="590" y="162" font-size="11" fill="#888">UUID · PK</text>
  <text x="504" y="178" font-size="11" fill="#555">email</text><text x="590" y="178" font-size="11" fill="#888">VARCHAR · unique</text>
  <text x="504" y="194" font-size="11" fill="#555">passwordHash</text><text x="590" y="194" font-size="11" fill="#888">VARCHAR</text>
  <text x="504" y="210" font-size="11" fill="#555">displayName</text><text x="590" y="210" font-size="11" fill="#888">VARCHAR</text>
  <text x="504" y="226" font-size="11" fill="#555">createdAt</text><text x="590" y="226" font-size="11" fill="#888">TIMESTAMP</text>
  <line x1="500" y1="233" x2="742" y2="233" stroke="#EEEEEE" stroke-width="1"/>
  <text x="504" y="248" font-size="10" fill="#27AE60" font-style="italic">→ has many Decks, has many Progress</text>
  <text x="504" y="262" font-size="10" fill="#999" font-style="italic">One user can own multiple decks</text>
  <text x="504" y="276" font-size="10" fill="#999" font-style="italic">and track progress on any card</text>

  <!-- ── DECK ── -->
  <rect x="340" y="360" width="240" height="172" rx="10" fill="white" stroke="#27AE60" stroke-width="2" filter="url(#shadow)"/>
  <rect x="340" y="360" width="240" height="34" rx="10" fill="#27AE60"/>
  <rect x="340" y="378" width="240" height="16" fill="#27AE60"/>
  <text x="460" y="382" text-anchor="middle" font-size="13" fill="white" font-weight="bold">🗂 Deck</text>

  <text x="354" y="412" font-size="11" fill="#555" font-weight="bold">id</text><text x="410" y="412" font-size="11" fill="#888">UUID · PK</text>
  <text x="354" y="428" font-size="11" fill="#555">name</text><text x="410" y="428" font-size="11" fill="#888">VARCHAR</text>
  <text x="354" y="444" font-size="11" fill="#555">language</text><text x="410" y="444" font-size="11" fill="#888">VARCHAR</text>
  <text x="354" y="460" font-size="11" fill="#E63946" font-weight="bold">userId</text><text x="410" y="460" font-size="11" fill="#888">FK → User</text>
  <text x="354" y="476" font-size="11" fill="#555">createdAt</text><text x="410" y="476" font-size="11" fill="#888">TIMESTAMP</text>
  <line x1="350" y1="482" x2="572" y2="482" stroke="#EEEEEE" stroke-width="1"/>
  <text x="354" y="496" font-size="10" fill="#27AE60" font-style="italic">→ has many Cards</text>
  <text x="354" y="510" font-size="10" fill="#999" font-style="italic">← belongs to one User</text>
  <text x="354" y="524" font-size="10" fill="#999" font-style="italic">Deleting a deck cascades to cards</text>

  <!-- ── CARD ── -->
  <rect x="620" y="360" width="240" height="188" rx="10" fill="white" stroke="#27AE60" stroke-width="2" filter="url(#shadow)"/>
  <rect x="620" y="360" width="240" height="34" rx="10" fill="#27AE60"/>
  <rect x="620" y="378" width="240" height="16" fill="#27AE60"/>
  <text x="740" y="382" text-anchor="middle" font-size="13" fill="white" font-weight="bold">🃏 Card</text>

  <text x="634" y="412" font-size="11" fill="#555" font-weight="bold">id</text><text x="680" y="412" font-size="11" fill="#888">UUID · PK</text>
  <text x="634" y="428" font-size="11" fill="#555">front</text><text x="680" y="428" font-size="11" fill="#888">TEXT</text>
  <text x="634" y="444" font-size="11" fill="#555">back</text><text x="680" y="444" font-size="11" fill="#888">TEXT</text>
  <text x="634" y="460" font-size="11" fill="#555">notes</text><text x="680" y="460" font-size="11" fill="#888">TEXT (nullable)</text>
  <text x="634" y="476" font-size="11" fill="#E63946" font-weight="bold">deckId</text><text x="680" y="476" font-size="11" fill="#888">FK → Deck</text>
  <text x="634" y="492" font-size="11" fill="#555">createdAt</text><text x="680" y="492" font-size="11" fill="#888">TIMESTAMP</text>
  <line x1="630" y1="498" x2="852" y2="498" stroke="#EEEEEE" stroke-width="1"/>
  <text x="634" y="512" font-size="10" fill="#27AE60" font-style="italic">→ has many Progress records</text>
  <text x="634" y="526" font-size="10" fill="#999" font-style="italic">← belongs to one Deck</text>
  <text x="634" y="540" font-size="10" fill="#999" font-style="italic">One card per user per Progress row</text>

  <!-- ── PROGRESS ── -->
  <rect x="470" y="600" width="280" height="175" rx="10" fill="white" stroke="#E67E22" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="600" width="280" height="34" rx="10" fill="#E67E22"/>
  <rect x="470" y="618" width="280" height="16" fill="#E67E22"/>
  <text x="610" y="622" text-anchor="middle" font-size="13" fill="white" font-weight="bold">📊 Progress</text>

  <text x="484" y="652" font-size="11" fill="#555" font-weight="bold">id</text><text x="528" y="652" font-size="11" fill="#888">UUID · PK</text>
  <text x="484" y="668" font-size="11" fill="#E63946" font-weight="bold">userId</text><text x="528" y="668" font-size="11" fill="#888">FK → User</text>
  <text x="484" y="684" font-size="11" fill="#E63946" font-weight="bold">cardId</text><text x="528" y="684" font-size="11" fill="#888">FK → Card</text>
  <text x="484" y="700" font-size="11" fill="#555">interval</text><text x="560" y="700" font-size="11" fill="#888">INT (days)</text>
  <text x="484" y="716" font-size="11" fill="#555">easeFactor</text><text x="560" y="716" font-size="11" fill="#888">FLOAT</text>
  <text x="484" y="732" font-size="11" fill="#555">dueDate</text><text x="560" y="732" font-size="11" fill="#888">TIMESTAMP</text>
  <text x="484" y="748" font-size="11" fill="#555">repetitions</text><text x="560" y="748" font-size="11" fill="#888">INT</text>
  <line x1="480" y1="754" x2="742" y2="754" stroke="#EEEEEE" stroke-width="1"/>
  <text x="484" y="768" font-size="10" fill="#E67E22" font-style="italic">UNIQUE (userId, cardId)</text>

  <!-- ─── RELATIONSHIP ARROWS ──────────────────────── -->
  <!-- User → Deck -->
  <path d="M 540 292 L 460 360" stroke="#1E4D8C" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="5 3"/>
  <rect x="462" y="315" width="76" height="18" rx="4" fill="white" stroke="#CBD5E8" stroke-width="1"/>
  <text x="500" y="328" text-anchor="middle" font-size="10" fill="#1E4D8C" font-weight="bold">1 : MANY</text>

  <!-- User → Progress -->
  <path d="M 690 292 C 780 450 730 520 650 600" stroke="#1E4D8C" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="5 3"/>
  <rect x="740" y="430" width="76" height="18" rx="4" fill="white" stroke="#CBD5E8" stroke-width="1"/>
  <text x="778" y="443" text-anchor="middle" font-size="10" fill="#1E4D8C" font-weight="bold">1 : MANY</text>

  <!-- Deck → Card -->
  <path d="M 580 446 L 620 446" stroke="#27AE60" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="586" y="432" width="76" height="18" rx="4" fill="white" stroke="#27AE60" stroke-width="1"/>
  <text x="624" y="445" text-anchor="middle" font-size="10" fill="#27AE60" font-weight="bold">1 : MANY</text>

  <!-- Card → Progress -->
  <path d="M 720 548 L 680 600" stroke="#E67E22" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <rect x="695" y="568" width="76" height="18" rx="4" fill="white" stroke="#E67E22" stroke-width="1"/>
  <text x="733" y="581" text-anchor="middle" font-size="10" fill="#E67E22" font-weight="bold">1 : MANY</text>

  <!-- ════════════════════════════════════════════════ -->
  <!--  RIGHT COLUMN: REQUEST FLOW                      -->
  <!-- ════════════════════════════════════════════════ -->
  <line x1="880" y1="82" x2="880" y2="760" stroke="#CBD5E8" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="990" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E4D8C" letter-spacing="1">REQUEST FLOW</text>

  <!-- Flow boxes -->
  <rect x="910" y="112" width="160" height="40" rx="8" fill="#EAF4FF" stroke="#2E86DE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="990" y="128" text-anchor="middle" font-size="11" fill="#1E4D8C" font-weight="bold">🌐 HTTP Request</text>
  <text x="990" y="144" text-anchor="middle" font-size="10" fill="#555">from Next.js client</text>

  <line x1="990" y1="152" x2="990" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="910" y="174" width="160" height="40" rx="8" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="990" y="190" text-anchor="middle" font-size="11" fill="#E67E22" font-weight="bold">🔒 JwtAuthGuard</text>
  <text x="990" y="206" text-anchor="middle" font-size="10" fill="#555">verifies Bearer token</text>

  <line x1="990" y1="214" x2="990" y2="232" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="910" y="236" width="160" height="40" rx="8" fill="#E8F8EE" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="990" y="252" text-anchor="middle" font-size="11" fill="#27AE60" font-weight="bold">🎮 Controller</text>
  <text x="990" y="268" text-anchor="middle" font-size="10" fill="#555">routes request</text>

  <line x1="990" y1="276" x2="990" y2="294" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="910" y="298" width="160" height="40" rx="8" fill="#EAF4FF" stroke="#2E86DE" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="990" y="314" text-anchor="middle" font-size="11" fill="#2E86DE" font-weight="bold">✅ ValidationPipe</text>
  <text x="990" y="330" text-anchor="middle" font-size="10" fill="#555">validates DTO body</text>

  <line x1="990" y1="338" x2="990" y2="356" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="910" y="360" width="160" height="40" rx="8" fill="#FFF9E6" stroke="#F39C12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="990" y="376" text-anchor="middle" font-size="11" fill="#B7770D" font-weight="bold">⚙️ Service</text>
  <text x="990" y="392" text-anchor="middle" font-size="10" fill="#555">business logic</text>

  <line x1="990" y1="400" x2="990" y2="418" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="910" y="422" width="160" height="40" rx="8" fill="#F3F0FF" stroke="#8E44AD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="990" y="438" text-anchor="middle" font-size="11" fill="#8E44AD" font-weight="bold">🗄 TypeORM Repo</text>
  <text x="990" y="454" text-anchor="middle" font-size="10" fill="#555">SQL queries</text>

  <line x1="990" y1="462" x2="990" y2="480" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="910" y="484" width="160" height="40" rx="8" fill="#EEF0F2" stroke="#555" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="990" y="500" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">🐘 PostgreSQL</text>
  <text x="990" y="516" text-anchor="middle" font-size="10" fill="#555">stores all data</text>

  <!-- Return path -->
  <path d="M 912 504 C 895 504 895 200 912 200" stroke="#BBB" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="884" y="360" font-size="10" fill="#999" transform="rotate(-90,884,360)">JSON response</text>

  <!-- Scheduler note -->
  <rect x="910" y="560" width="160" height="60" rx="8" fill="#FFF3E0" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="4 3" filter="url(#shadow)"/>
  <text x="990" y="578" text-anchor="middle" font-size="11" fill="#E67E22" font-weight="bold">⏰ Scheduler</text>
  <text x="990" y="594" text-anchor="middle" font-size="10" fill="#555">runs daily cron job</text>
  <text x="990" y="608" text-anchor="middle" font-size="10" fill="#555">finds due cards → notify</text>

  <!-- Bottom note -->
  <rect x="30" y="580" width="250" height="36" rx="6" fill="#FDECEA" stroke="#E74C3C" stroke-width="1"/>
  <text x="155" y="596" text-anchor="middle" font-size="10" fill="#C0392B" font-weight="bold">⚠️ Ownership rule (all services)</text>
  <text x="155" y="611" text-anchor="middle" font-size="10" fill="#555">Always filter by userId — users can only</text>

  <rect x="30" y="620" width="250" height="20" rx="4" fill="#FDECEA" stroke="#E74C3C" stroke-width="1"/>
  <text x="155" y="634" text-anchor="middle" font-size="10" fill="#555">access their own decks, cards &amp; progress.</text>
</svg>
